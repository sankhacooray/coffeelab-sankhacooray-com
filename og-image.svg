<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="0.7" cy="0" r="1">
      <stop offset="0" stop-color="#3a2515"/>
      <stop offset="0.7" stop-color="#1a120c"/>
    </radialGradient>
    <linearGradient id="cup" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b8a386"/>
      <stop offset="0.1" stop-color="#f0e4d3"/>
      <stop offset="0.4" stop-color="#fff8ec"/>
      <stop offset="0.8" stop-color="#f0e4d3"/>
      <stop offset="1" stop-color="#a08868"/>
    </linearGradient>
    <linearGradient id="coffee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a1f10"/>
      <stop offset="1" stop-color="#1f0e07"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- left: title -->
  <g transform="translate(80, 160)" fill="#f3e7d6" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">
    <text x="0" y="0" font-size="92" font-weight="700" letter-spacing="-2">Coffee Lab</text>
    <text x="0" y="56" font-size="28" fill="#b39b80" font-weight="400">Build a coffee drink ingredient by ingredient</text>
    <text x="0" y="96" font-size="28" fill="#b39b80" font-weight="400">and see which famous coffee you just made.</text>
    <g transform="translate(0, 160)" font-size="22" fill="#d4a574" font-weight="600">
      <rect x="0"   y="0" width="130" height="40" rx="20" fill="#34251a" stroke="#4a3424"/>
      <text x="20" y="27">Espresso</text>
      <rect x="146" y="0" width="180" height="40" rx="20" fill="#34251a" stroke="#4a3424"/>
      <text x="166" y="27">Cappuccino</text>
      <rect x="342" y="0" width="140" height="40" rx="20" fill="#34251a" stroke="#4a3424"/>
      <text x="362" y="27">Mocha</text>
      <rect x="498" y="0" width="160" height="40" rx="20" fill="#34251a" stroke="#4a3424"/>
      <text x="518" y="27">Affogato</text>
    </g>
    <text x="0" y="270" font-size="20" fill="#b39b80" font-weight="400">coffeelab.sankhacooray.com</text>
  </g>

  <!-- right: cup -->
  <g transform="translate(860, 180)">
    <g opacity="0.45" stroke="#f3e7d6" stroke-width="8" stroke-linecap="round" fill="none">
      <path d="M40 -40 Q60 -10 40 20 Q20 50 40 80"/>
      <path d="M110 -60 Q130 -30 110 0 Q90 30 110 60"/>
      <path d="M180 -40 Q200 -10 180 20 Q160 50 180 80"/>
    </g>
    <ellipse cx="120" cy="300" rx="170" ry="18" fill="#c9b89c"/>
    <ellipse cx="120" cy="294" rx="160" ry="14" fill="#f0e4d3"/>
    <path d="M-20 120 L-20 270 Q-20 292 5 292 L227 292 Q252 292 252 270 L252 120 Z" fill="url(#cup)"/>
    <path d="M252 150 Q310 150 310 210 Q310 270 252 270" stroke="#c9b89c" stroke-width="22" fill="none" stroke-linecap="round"/>
    <path d="M-20 120 L252 120 L252 140 Q116 156 -20 140 Z" fill="#2a1c12"/>
    <ellipse cx="116" cy="130" rx="132" ry="14" fill="url(#coffee)"/>
    <ellipse cx="80" cy="128" rx="40" ry="4" fill="#c97a3c" opacity="0.6"/>
  </g>
