<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2515"/>
      <stop offset="1" stop-color="#1a120c"/>
    </linearGradient>
    <linearGradient id="cup" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b8a386"/>
      <stop offset="0.1" stop-color="#f0e4d3"/>
      <stop offset="0.4" stop-color="#fff8ec"/>
      <stop offset="0.8" stop-color="#f0e4d3"/>
      <stop offset="1" stop-color="#a08868"/>
    </linearGradient>
    <linearGradient id="coffee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a1f10"/>
      <stop offset="1" stop-color="#1f0e07"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- steam -->
  <g opacity="0.45" fill="#f3e7d6">
    <path d="M180 100 Q200 130 180 160 Q160 190 180 220" stroke="#f3e7d6" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M256 80 Q276 110 256 140 Q236 170 256 200" stroke="#f3e7d6" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M332 100 Q352 130 332 160 Q312 190 332 220" stroke="#f3e7d6" stroke-width="10" stroke-linecap="round" fill="none"/>
  </g>
  <!-- saucer -->
  <ellipse cx="256" cy="438" rx="170" ry="18" fill="#c9b89c"/>
  <ellipse cx="256" cy="432" rx="160" ry="14" fill="#f0e4d3"/>
  <!-- cup -->
  <path d="M120 260 L120 410 Q120 432 145 432 L367 432 Q392 432 392 410 L392 260 Z" fill="url(#cup)"/>
  <!-- handle -->
  <path d="M392 290 Q450 290 450 350 Q450 410 392 410" stroke="#c9b89c" stroke-width="20" fill="none" stroke-linecap="round"/>
  <!-- rim -->
  <path d="M120 260 L392 260 L392 280 Q256 296 120 280 Z" fill="#2a1c12"/>
  <!-- coffee surface -->
  <ellipse cx="256" cy="270" rx="132" ry="14" fill="url(#coffee)"/>
  <!-- crema highlight -->
  <ellipse cx="220" cy="268" rx="40" ry="4" fill="#c97a3c" opacity="0.6"/>
</svg>
