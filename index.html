<html lang="en">

<style>
  :root {
    --bg: #1a120c;
    --bg-2: #211710;
    --panel: #2a1d14;
    --panel-2: #34251a;
    --line: #4a3424;
    --text: #f3e7d6;
    --muted: #b39b80;
    --accent: #d4a574;
    --accent-2: #c97a3c;
    --ok: #8fd584;
    --ceramic: #f0e4d3;
    --ceramic-shadow: #c9b89c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  body {
    font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background:
      radial-gradient(1200px 600px at 80% -10%, #3a2515 0%, transparent 60%),
      radial-gradient(800px 500px at 10% 100%, #2a1810 0%, transparent 60%),
      var(--bg);
    min-height: 100vh;
  }
  .wrap { max-width: 1400px; margin: 0 auto; padding: 10px 18px 14px; }
  header { padding: 2px 2px 8px; display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  h1 { font-size: 18px; margin: 0; letter-spacing: -.01em; }
  h1 .bean { display: inline-block; width: 10px; height: 14px; background: var(--accent); border-radius: 50%/40%; margin-right: 6px; transform: translateY(2px); box-shadow: inset -2px 0 0 rgba(0,0,0,.3); }
  .sub { color: var(--muted); font-size: 12px; }

  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; margin: 0; }
  .card h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin: 0 0 8px; font-weight: 600; }

  .layout { display: grid; grid-template-columns: 240px 280px 1fr; gap: 12px; align-items: stretch; }
  @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } }

  .families { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .fam-btn {
    cursor: pointer; border: 1px solid var(--line); background: var(--panel-2);
    color: var(--muted); padding: 3px 8px; border-radius: 999px; font-size: 11px;
    transition: all .15s;
  }
  .fam-btn.active, .fam-btn:hover { color: var(--text); border-color: var(--accent); background: var(--panel); }

  .drinks { display: flex; flex-direction: column; gap: 3px; }
  .drink {
    cursor: pointer; border: 1px solid var(--line); background: var(--panel-2);
    color: var(--text); padding: 5px 9px; border-radius: 8px; text-align: left;
    transition: all .15s;
    font: inherit;
    display: flex; align-items: baseline; gap: 8px; overflow: hidden;
  }
  .drink:hover { border-color: var(--accent); }
  .drink.active { border-color: var(--accent-2); background: var(--panel); box-shadow: 0 0 0 1px var(--accent-2); }
  .drink .name { font-weight: 600; font-size: 12px; flex-shrink: 0; white-space: nowrap; }
  .drink .ings { color: var(--muted); font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }

  /* Center column: cup viz + notes below */
  .viz {
    display: flex; flex-direction: column; align-items: center;
    padding: 8px 10px 10px;
  }
  .scene {
    position: relative;
    width: 260px; height: 300px;
    display: flex; justify-content: center; align-items: flex-end;
  }
  .saucer {
    position: absolute; bottom: 2px;
    width: 260px; height: 18px;
    background: radial-gradient(ellipse at center, var(--ceramic) 0%, var(--ceramic-shadow) 90%, transparent 100%);
    border-radius: 50%;
    box-shadow: 0 8px 18px rgba(0,0,0,.5);
    z-index: 0;
  }
  .cup-wrap {
    position: relative;
    width: 200px;
    height: 240px;
    margin-bottom: 10px;
    z-index: 1;
  }
  .cup {
    position: absolute; inset: 0;
    background: linear-gradient(to right, #d6c5ab 0%, var(--ceramic) 12%, #fff8ec 38%, var(--ceramic) 78%, #b8a386 100%);
    border-radius: 18px 18px 110px 110px / 18px 18px 28px 28px;
    box-shadow:
      inset 0 -10px 24px rgba(0,0,0,.18),
      inset 0 8px 0 rgba(255,255,255,.4),
      0 14px 24px rgba(0,0,0,.4);
    overflow: hidden;
  }
  .cup-rim {
    position: absolute; top: 0; left: 0; right: 0; height: 16px;
    border-radius: 16px 16px 0 0;
    background: linear-gradient(to bottom,
      #6b4d33 0%,
      #4a3422 4px,
      #2a1c12 8px,
      transparent 16px);
    z-index: 4;
    pointer-events: none;
  }
  .liquid {
    position: absolute; left: 4px; right: 4px; bottom: 4px;
    height: 0;
    border-radius: 0 0 100px 100px / 0 0 22px 22px;
    overflow: hidden;
    display: flex; flex-direction: column-reverse;
    transition: height .35s ease;
    z-index: 2;
  }
  .layer {
    width: 100%;
    transition: height .35s ease, background .25s ease;
    position: relative;
  }
  .layer.foam {
    background:
      radial-gradient(circle at 20% 30%, #fff 0 3px, transparent 4px),
      radial-gradient(circle at 60% 60%, #fff 0 2px, transparent 3px),
      radial-gradient(circle at 80% 20%, #fff 0 3px, transparent 4px),
      radial-gradient(circle at 40% 80%, #fff 0 2px, transparent 3px),
      linear-gradient(to bottom, #fffaf0, #f3e8d3);
    background-size: 22px 22px, 16px 16px, 26px 26px, 18px 18px, 100% 100%;
  }
  .layer.whipped {
    background:
      radial-gradient(circle at 25% 40%, rgba(255,255,255,.95) 0 8px, transparent 9px),
      radial-gradient(circle at 70% 30%, rgba(255,255,255,.95) 0 10px, transparent 11px),
      radial-gradient(circle at 50% 70%, rgba(255,255,255,.95) 0 7px, transparent 8px),
      linear-gradient(to bottom, #fffefb, #f5ecd8);
    background-size: 28px 28px, 32px 32px, 24px 24px, 100% 100%;
  }
  .layer.ice {
    background:
      linear-gradient(135deg, rgba(255,255,255,.5) 0 4px, transparent 4px 12px),
      linear-gradient(45deg, rgba(255,255,255,.5) 0 4px, transparent 4px 12px),
      linear-gradient(to bottom, #d6e7f2, #b4cfdf);
    background-size: 14px 14px, 14px 14px, 100% 100%;
  }
  .layer.cocoa {
    background:
      radial-gradient(circle at 30% 50%, #2a1408 0 1px, transparent 2px),
      radial-gradient(circle at 60% 30%, #2a1408 0 1px, transparent 2px),
      radial-gradient(circle at 80% 70%, #2a1408 0 1px, transparent 2px),
      linear-gradient(to bottom, #4a2c1a, #6b3e22);
    background-size: 6px 6px, 8px 8px, 7px 7px, 100% 100%;
  }
  .layer.icecream {
    background: radial-gradient(ellipse at 30% 30%, #fff8d6 0 28px, #fff5c8 40%, #f5e6a8 100%);
    border-radius: 60% 60% 30% 30% / 70% 70% 30% 30%;
    margin-top: -10px;
  }
  .layer.sugar {
    background: linear-gradient(to bottom, rgba(255,255,255,.4), rgba(255,255,255,.1));
    box-shadow: inset 0 -2px 0 rgba(255,255,255,.6);
  }
  .cup-handle {
    position: absolute;
    right: -30px; top: 60px;
    width: 50px; height: 96px;
    border: 12px solid var(--ceramic);
    border-left-color: transparent;
    border-radius: 0 60% 60% 0 / 0 50% 50% 0;
    box-shadow: 2px 2px 6px rgba(0,0,0,.3);
    z-index: 0;
  }
  .steam {
    position: absolute; left: 50%; top: -24px; width: 60px; height: 50px;
    transform: translateX(-50%);
    pointer-events: none;
    opacity: .5;
  }
  .steam span {
    position: absolute; bottom: 0;
    width: 8px; height: 30px;
    background: linear-gradient(to top, rgba(255,255,255,.5), rgba(255,255,255,0));
    border-radius: 50%;
    animation: rise 2.4s infinite ease-in;
  }
  .steam span:nth-child(1) { left: 18px; animation-delay: 0s; }
  .steam span:nth-child(2) { left: 30px; animation-delay: .6s; }
  .steam span:nth-child(3) { left: 42px; animation-delay: 1.2s; }
  @keyframes rise {
    0% { transform: translateY(0) scale(.6); opacity: 0; }
    30% { opacity: .7; }
    100% { transform: translateY(-40px) scale(1.2); opacity: 0; }
  }

  .match-banner {
    margin-top: 10px;
    padding: 8px 12px;
    width: 100%;
    background: linear-gradient(90deg, rgba(212,165,116,.18), rgba(201,122,60,.18));
    border: 1px solid var(--accent);
    border-radius: 10px;
    text-align: center;
    min-height: 36px;
    display: flex; align-items: center; justify-content: center;
    transition: all .25s ease;
  }
  .match-banner.empty {
    background: transparent;
    border-color: var(--line);
    color: var(--muted);
  }
  .match-banner .made {
    font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; margin-right: 6px;
  }
  .match-banner .drink-name {
    font-size: 16px; font-weight: 700; color: var(--accent);
  }
  .match-banner .hint { font-size: 12px; }

  /* Notes panel below the cup */
  .notes {
    margin-top: 10px;
    width: 100%;
    padding: 10px 12px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.55;
    flex-grow: 1;
  }
  .notes .note-title {
    color: var(--accent);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .12em;
    margin-bottom: 4px;
  }
  .notes .note-body { color: var(--text); font-size: 13px; line-height: 1.5; }
  .notes .recipe-table { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
  .notes .recipe-row { display: flex; justify-content: space-between; gap: 8px; font-size: 11px; }
  .notes .recipe-row .ing { color: var(--text); }
  .notes .recipe-row .amt { color: var(--muted); font-variant-numeric: tabular-nums; }
  .notes .closest-row { display: flex; align-items: center; gap: 6px; font-size: 11px; margin-top: 2px; }
  .notes .closest-pill {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--panel); border: 1px solid var(--line);
    padding: 2px 8px; border-radius: 999px; color: var(--text);
    font-size: 11px;
  }
  .notes .closest-pill .delta { color: var(--accent); font-weight: 600; }

  /* Stages — the build column */
  .stages-card { display: flex; flex-direction: column; }
  .stages-head {
    display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
    margin-bottom: 6px;
  }
  .stages-head h2 { margin: 0; }
  .stages-head .clear-link {
    cursor: pointer; background: transparent; border: 0;
    color: var(--muted); font-size: 11px; padding: 2px 4px;
    text-decoration: underline; text-decoration-color: var(--line);
    font: inherit; font-size: 11px;
  }
  .stages-head .clear-link:hover { color: var(--accent); text-decoration-color: var(--accent); }

  .stages-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 14px;
    align-content: start;
  }
  .stage { display: flex; flex-direction: column; gap: 4px; }
  .stage-head {
    display: flex; align-items: baseline; gap: 6px; padding-bottom: 4px;
    border-bottom: 1px dashed var(--line);
    margin-bottom: 4px;
  }
  .stage-head .stage-num {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--accent);
    font-size: 10px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .stage-head h3 { margin: 0; font-size: 12px; font-weight: 600; color: var(--text); }
  .stage-head .stage-hint { font-size: 10px; color: var(--muted); margin-left: auto; }

  .ings-list { display: flex; flex-direction: column; gap: 3px; }
  .ing-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 8px;
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 8px;
  }
  .ing-row.has { border-color: var(--accent); }
  .ing-meta { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1; }
  .swatch { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,.3); flex-shrink: 0; }
  .ing-name { font-size: 12px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ing-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .btn {
    cursor: pointer; user-select: none;
    background: var(--panel); color: var(--text);
    border: 1px solid var(--line); border-radius: 6px;
    width: 22px; height: 22px;
    font-size: 14px; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all .12s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn:active { transform: scale(.95); }
  .btn.plus { color: var(--accent); }
  .btn.minus { color: var(--muted); }
  .ing-amount {
    min-width: 18px; text-align: center; font-variant-numeric: tabular-nums;
    color: var(--text); font-weight: 600; font-size: 12px;
  }
  .ing-amount.zero { color: var(--muted); font-weight: 400; }

  footer { margin-top: 10px; padding: 4px 4px; color: var(--muted); font-size: 11px; text-align: center; }
  footer a { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="bean"></span>Coffee Lab</h1>
    <div class="sub">Pick a coffee, or build one — base, milk, sweetener, toppings — and watch which famous drink you just made.</div>
  </header>

  <div class="layout">
    <div class="card">
      <h2>Famous coffees</h2>
      <div class="families" id="families"></div>
      <div class="drinks" id="drinks"></div>
    </div>

    <div class="card viz">
      <div class="scene">
        <div class="cup-wrap">
          <div class="steam" id="steam">
            <span></span><span></span><span></span>
          </div>
          <div class="cup-handle"></div>
          <div class="cup">
            <div class="cup-rim"></div>
            <div class="liquid" id="liquid"></div>
          </div>
        </div>
        <div class="saucer"></div>
      </div>
      <div class="match-banner empty" id="matchBanner">
        <span class="hint">Add ingredients to start brewing</span>
      </div>
      <div class="notes" id="notes"></div>
    </div>

    <div class="card stages-card">
      <div class="stages-head">
        <h2>Build your drink</h2>
        <button class="clear-link" id="clearBtn">empty the cup</button>
      </div>
      <div class="stages-grid" id="stages"></div>
    </div>
  </div>

  <footer>
    <a href="https://github.com/sankhacooray/coffeelab-sankhacooray-com">github.com/sankhacooray/coffeelab-sankhacooray-com</a>
  </footer>
</div>

<script>
/* ============================================================
   INGREDIENTS — color, density (lower = sinks), stage, optional texture klass
   ============================================================ */
const INGREDIENTS = {
  espresso:           { name: "Espresso shot",     stage: "base",      color: "#2f1a0d", density: 3 },
  ristretto:          { name: "Ristretto",         stage: "base",      color: "#1f0e07", density: 3 },
  cold_brew:          { name: "Cold brew",         stage: "base",      color: "#2d1812", density: 3 },

  hot_water:          { name: "Hot water",         stage: "water",     color: "#8a5a38", density: 4 },
  cold_water:         { name: "Cold water",        stage: "water",     color: "#aac2d0", density: 4 },
  ice:                { name: "Ice",               stage: "water",     color: "#d6e7f2", density: 8, klass: "ice" },

  steamed_milk:       { name: "Steamed milk",      stage: "milk",      color: "#f3e6cf", density: 6 },
  cold_milk:          { name: "Cold milk",         stage: "milk",      color: "#fbf6ec", density: 6 },
  oat_milk:           { name: "Oat milk",          stage: "milk",      color: "#ecdeba", density: 6 },
  almond_milk:        { name: "Almond milk",       stage: "milk",      color: "#e8d8b8", density: 6 },
  soy_milk:           { name: "Soy milk",          stage: "milk",      color: "#f4e8c8", density: 6 },
  pistachio_oat_milk: { name: "Pistachio oat",     stage: "milk",      color: "#cfd9a6", density: 6 },

  sugar:              { name: "Sugar",             stage: "sweetener", color: "#ece2c8", density: 2, klass: "sugar" },
  chocolate:          { name: "Chocolate syrup",   stage: "sweetener", color: "#1e0e08", density: 1 },
  vanilla_syrup:      { name: "Vanilla syrup",     stage: "sweetener", color: "#d9b573", density: 1 },
  caramel_syrup:      { name: "Caramel syrup",     stage: "sweetener", color: "#8a4f1e", density: 1 },

  whisky:             { name: "Irish whiskey",     stage: "spirit",    color: "#b8651b", density: 5 },

  milk_foam:          { name: "Milk foam",         stage: "foam",      color: "#fffaf0", density: 9, klass: "foam" },
  whipped_cream:      { name: "Whipped cream",     stage: "foam",      color: "#fffefb", density: 10, klass: "whipped" },
  ice_cream:          { name: "Vanilla ice cream", stage: "foam",      color: "#fff5c8", density: 7, klass: "icecream" },

  cocoa:              { name: "Cocoa dusting",     stage: "dust",      color: "#4a2c1a", density: 11, klass: "cocoa" },
};

/* ============================================================
   STAGES — the order you build a coffee
   ============================================================ */
const STAGES = [
  { id: "base",      title: "Base",         hint: "the coffee itself" },
  { id: "water",     title: "Water & ice",  hint: "dilute or chill" },
  { id: "milk",      title: "Milk",         hint: "dairy or plant" },
  { id: "sweetener", title: "Sweetener",    hint: "sugar or syrup" },
  { id: "spirit",    title: "Spirit",       hint: "a measure" },
  { id: "foam",      title: "Foam & top",   hint: "the finish" },
  { id: "dust",      title: "Dust",         hint: "garnish" },
];

/* ============================================================
   FAMOUS COFFEES — recipe is { ingredientId: parts }, 1 part ≈ 30 ml
   ============================================================ */
const COFFEES = [
  { id: "espresso",     name: "Espresso",        family: "Pure espresso",   recipe: { espresso: 1 },                                                      notes: "A single 30 ml shot pulled in 25–30 s. The foundation of every Italian café drink." },
  { id: "doppio",       name: "Doppio",          family: "Pure espresso",   recipe: { espresso: 2 },                                                      notes: "Two espresso shots in one cup. \"Double\" in Italian." },
  { id: "ristretto",    name: "Ristretto",       family: "Pure espresso",   recipe: { ristretto: 1 },                                                     notes: "A \"restricted\" pull — same ground coffee, less water. More syrupy and less bitter than a normal shot." },

  { id: "americano",    name: "Americano",       family: "With water",      recipe: { espresso: 1, hot_water: 3 },                                        notes: "Espresso lengthened with hot water. Folklore says US soldiers in WWII asked Italian baristas to dilute their espresso." },
  { id: "long_black",   name: "Long Black",      family: "With water",      recipe: { espresso: 2, hot_water: 2 },                                        notes: "Antipodean reverse of an Americano — hot water first, then the shots poured on top. Keeps the crema intact." },

  { id: "macchiato",    name: "Macchiato",       family: "Milk-forward",    recipe: { espresso: 1, milk_foam: 1 },                                        notes: "Espresso \"marked\" (macchiato) with just a dollop of milk foam." },
  { id: "cortado",      name: "Cortado",         family: "Milk-forward",    recipe: { espresso: 1, steamed_milk: 1 },                                     notes: "Equal parts espresso and steamed milk. Spanish for \"cut\"." },
  { id: "flat_white",   name: "Flat White",      family: "Milk-forward",    recipe: { espresso: 2, steamed_milk: 4 },                                     notes: "Antipodean specialty: double espresso under velvety microfoam, no thick foam cap." },
  { id: "cappuccino",   name: "Cappuccino",      family: "Milk-forward",    recipe: { espresso: 1, steamed_milk: 2, milk_foam: 2 },                       notes: "Equal thirds of espresso, steamed milk, and milk foam. Named after the brown hood of Capuchin monks." },
  { id: "latte",        name: "Latte",           family: "Milk-forward",    recipe: { espresso: 1, steamed_milk: 5, milk_foam: 1 },                       notes: "Mostly steamed milk over an espresso, with a thin foam cap." },

  { id: "mocha",        name: "Café Mocha",      family: "Sweet & rich",    recipe: { chocolate: 1, espresso: 1, steamed_milk: 4, whipped_cream: 1 },     notes: "Espresso with chocolate syrup and steamed milk, often crowned with whipped cream." },
  { id: "vienna",       name: "Vienna",          family: "Sweet & rich",    recipe: { espresso: 2, whipped_cream: 2, cocoa: 1 },                          notes: "Two shots topped with mountains of whipped cream and a dusting of cocoa. The Wiener Melange's richer cousin." },
  { id: "cubano",       name: "Café Cubano",     family: "Sweet & rich",    recipe: { sugar: 1, espresso: 1 },                                            notes: "Espresso pulled directly onto sugar and whipped into an \"espuma\". Fiercely sweet." },
  { id: "vanilla_latte",name: "Vanilla Latte",   family: "Sweet & rich",    recipe: { vanilla_syrup: 1, espresso: 1, steamed_milk: 5, milk_foam: 1 },     notes: "Latte sweetened with vanilla syrup." },
  { id: "caramel_macc", name: "Caramel Macchiato",family:"Sweet & rich",    recipe: { vanilla_syrup: 1, steamed_milk: 4, espresso: 1, caramel_syrup: 1, milk_foam: 1 }, notes: "Vanilla-sweetened milk, espresso \"marked\" on top, then a caramel drizzle. A Starbucks classic." },

  { id: "oat_latte",    name: "Oat Latte",       family: "Alt milk",        recipe: { espresso: 1, oat_milk: 5, milk_foam: 1 },                           notes: "Latte made with oat milk. The default plant-milk in third-wave cafés — steams to a silky microfoam." },
  { id: "almond_latte", name: "Almond Latte",    family: "Alt milk",        recipe: { espresso: 1, almond_milk: 5, milk_foam: 1 },                       notes: "Latte made with almond milk. Nutty, slightly thinner texture than oat." },
  { id: "soy_latte",    name: "Soy Latte",       family: "Alt milk",        recipe: { espresso: 1, soy_milk: 5, milk_foam: 1 },                           notes: "Latte with soy milk — the original specialty alt-milk." },
  { id: "pistachio_latte",name:"Pistachio Latte",family: "Alt milk",        recipe: { espresso: 1, pistachio_oat_milk: 5, milk_foam: 1 },                 notes: "Latte with sweet pistachio-oat milk. A 2020s flavor-bar staple." },

  { id: "affogato",     name: "Affogato",        family: "With ice cream",  recipe: { espresso: 2, ice_cream: 2 },                                        notes: "A scoop of vanilla ice cream \"drowned\" (affogato) in hot espresso. Dessert and coffee in one cup." },

  { id: "iced_latte",   name: "Iced Latte",      family: "Iced",            recipe: { espresso: 1, cold_milk: 4, ice: 3 },                                notes: "Espresso poured over cold milk and ice." },
  { id: "iced_americano",name:"Iced Americano",  family: "Iced",            recipe: { espresso: 1, cold_water: 3, ice: 3 },                               notes: "Espresso over cold water and ice. Brisk and clean." },
  { id: "cold_brew",    name: "Cold Brew",       family: "Iced",            recipe: { cold_brew: 4 },                                                     notes: "Coffee steeped in cold water for 12–24 hours. Mellow, low-acid, no espresso machine needed." },

  { id: "irish",        name: "Irish Coffee",    family: "Spirited",        recipe: { espresso: 2, whisky: 1, sugar: 1, whipped_cream: 2 },               notes: "Hot coffee with Irish whiskey, sweetened, with a layer of cream floated on top. Invented at Foynes Airport, Ireland in 1943." },
];

/* ============================================================
   STATE
   ============================================================ */
const state = {
  cup: {},
  activeFamily: "All",
};

const CAPACITY = 10;

/* ============================================================
   HELPERS
   ============================================================ */
function shortIngLabel(id) {
  return INGREDIENTS[id].name.split(" ")[0].toLowerCase();
}
function recipeInline(recipe) {
  return Object.entries(recipe).map(([id, n]) => `${n}× ${shortIngLabel(id)}`).join(" + ");
}
function totalParts() {
  return Object.values(state.cup).reduce((s, n) => s + n, 0);
}

function findMatch() {
  const cupIds = Object.keys(state.cup).filter(k => state.cup[k] > 0);
  if (cupIds.length === 0) return null;
  for (const c of COFFEES) {
    const recipeIds = Object.keys(c.recipe);
    if (recipeIds.length !== cupIds.length) continue;
    let match = true;
    for (const id of recipeIds) {
      if (state.cup[id] !== c.recipe[id]) { match = false; break; }
    }
    if (match) return c;
  }
  return null;
}

function closestDrinks(n = 3) {
  const ranked = COFFEES.map(c => {
    const allKeys = new Set([...Object.keys(c.recipe), ...Object.keys(state.cup)]);
    let dist = 0;
    for (const k of allKeys) dist += Math.abs((c.recipe[k] || 0) - (state.cup[k] || 0));
    return { c, dist };
  }).sort((a, b) => a.dist - b.dist);
  return ranked.slice(0, n);
}

/* ============================================================
   RENDER — families + drinks
   ============================================================ */
function renderFamilies() {
  const families = ["All", ...Array.from(new Set(COFFEES.map(c => c.family)))];
  const root = document.getElementById("families");
  root.innerHTML = "";
  for (const fam of families) {
    const b = document.createElement("button");
    b.className = "fam-btn" + (fam === state.activeFamily ? " active" : "");
    b.textContent = fam;
    b.onclick = () => { state.activeFamily = fam; renderFamilies(); renderDrinks(); };
    root.appendChild(b);
  }
}

function renderDrinks() {
  const root = document.getElementById("drinks");
  root.innerHTML = "";
  const list = state.activeFamily === "All"
    ? COFFEES
    : COFFEES.filter(c => c.family === state.activeFamily);
  const currentMatch = findMatch();
  for (const c of list) {
    const b = document.createElement("button");
    b.className = "drink" + (currentMatch && currentMatch.id === c.id ? " active" : "");
    b.innerHTML = `<div class="name">${c.name}</div><div class="ings">${recipeInline(c.recipe)}</div>`;
    b.onclick = () => { state.cup = { ...c.recipe }; render(); };
    root.appendChild(b);
  }
}

/* ============================================================
   RENDER — stages (build your drink)
   ============================================================ */
function renderStages() {
  const root = document.getElementById("stages");
  root.innerHTML = "";
  STAGES.forEach((stage, idx) => {
    const ingIds = Object.keys(INGREDIENTS).filter(id => INGREDIENTS[id].stage === stage.id);
    if (ingIds.length === 0) return;
    const sec = document.createElement("section");
    sec.className = "stage";
    sec.innerHTML = `
      <div class="stage-head">
        <span class="stage-num">${idx + 1}</span>
        <h3>${stage.title}</h3>
        <span class="stage-hint">${stage.hint}</span>
      </div>
      <div class="ings-list">
        ${ingIds.map(id => {
          const ing = INGREDIENTS[id];
          const parts = state.cup[id] || 0;
          return `
            <div class="ing-row${parts > 0 ? " has" : ""}">
              <div class="ing-meta">
                <div class="swatch" style="background:${ing.color}"></div>
                <div class="ing-name">${ing.name}</div>
              </div>
              <div class="ing-controls">
                <button class="btn minus" data-id="${id}" data-delta="-1">−</button>
                <div class="ing-amount${parts === 0 ? " zero" : ""}">${parts}</div>
                <button class="btn plus" data-id="${id}" data-delta="1">+</button>
              </div>
            </div>
          `;
        }).join("")}
      </div>
    `;
    root.appendChild(sec);
  });
  root.onclick = (e) => {
    const btn = e.target.closest("button[data-id]");
    if (!btn) return;
    const id = btn.dataset.id;
    const delta = parseInt(btn.dataset.delta, 10);
    const next = (state.cup[id] || 0) + delta;
    if (next <= 0) delete state.cup[id];
    else state.cup[id] = Math.min(next, 9);
    render();
  };
}

/* ============================================================
   RENDER — liquid (the cup contents)
   ============================================================ */
function renderLiquid() {
  const liquid = document.getElementById("liquid");
  liquid.innerHTML = "";
  const entries = Object.entries(state.cup).filter(([, n]) => n > 0);
  const total = entries.reduce((s, [, n]) => s + n, 0);
  if (total === 0) {
    liquid.style.height = "0";
    document.getElementById("steam").style.opacity = "0";
    return;
  }
  entries.sort((a, b) => INGREDIENTS[a[0]].density - INGREDIENTS[b[0]].density);

  const fillFraction = Math.min(total / CAPACITY, 1);
  liquid.style.height = (fillFraction * 100) + "%";

  for (const [id, parts] of entries) {
    const ing = INGREDIENTS[id];
    const layer = document.createElement("div");
    layer.className = "layer" + (ing.klass ? " " + ing.klass : "");
    layer.style.height = ((parts / total) * 100) + "%";
    if (!ing.klass) layer.style.background = ing.color;
    liquid.appendChild(layer);
  }

  const hasHot = ["espresso","ristretto","steamed_milk","hot_water","whisky"].some(k => state.cup[k]);
  const hasCold = ["ice","cold_milk","cold_water","cold_brew"].some(k => state.cup[k]);
  document.getElementById("steam").style.opacity = (hasHot && !hasCold) ? ".5" : "0";
}

/* ============================================================
   RENDER — match banner + notes panel
   ============================================================ */
function renderBanner() {
  const banner = document.getElementById("matchBanner");
  const match = findMatch();
  const total = totalParts();
  if (match) {
    banner.className = "match-banner";
    banner.innerHTML = `<span class="made">You just made</span><span class="drink-name">${match.name}</span>`;
  } else if (total === 0) {
    banner.className = "match-banner empty";
    banner.innerHTML = `<span class="hint">Add ingredients to start brewing</span>`;
  } else {
    const closest = closestDrinks(1)[0];
    banner.className = "match-banner empty";
    banner.innerHTML = `<span class="hint">In progress — ${closest.dist} step${closest.dist === 1 ? "" : "s"} from a ${closest.c.name}</span>`;
  }
}

function renderNotes() {
  const root = document.getElementById("notes");
  const match = findMatch();
  const total = totalParts();
  if (match) {
    const recipeRows = Object.entries(match.recipe).map(([id, parts]) =>
      `<div class="recipe-row"><span class="ing">${INGREDIENTS[id].name}</span><span class="amt">${parts}× &middot; ${parts * 30} ml</span></div>`
    ).join("");
    root.innerHTML = `
      <div class="note-title">${match.family}</div>
      <div class="note-body">${match.notes}</div>
      <div class="recipe-table">${recipeRows}</div>
    `;
    return;
  }
  if (total === 0) {
    root.innerHTML = `
      <div class="note-title">How to use</div>
      <div class="note-body">Pick a famous coffee on the left, or build one yourself by stepping through <strong>Base → Milk → Sweetener → Toppings</strong> on the right. The cup pours itself as you go.</div>
    `;
    return;
  }
  // In-progress: show what's currently in the cup + closest matches
  const cupEntries = Object.entries(state.cup).filter(([, n]) => n > 0);
  cupEntries.sort((a, b) => INGREDIENTS[a[0]].density - INGREDIENTS[b[0]].density);
  const cupRows = cupEntries.map(([id, parts]) =>
    `<div class="recipe-row"><span class="ing">${INGREDIENTS[id].name}</span><span class="amt">${parts}× &middot; ${parts * 30} ml</span></div>`
  ).join("");
  const closest = closestDrinks(3);
  const pills = closest.map(({ c, dist }) =>
    `<span class="closest-pill">${c.name} <span class="delta">${dist} step${dist === 1 ? "" : "s"}</span></span>`
  ).join("");
  root.innerHTML = `
    <div class="note-title">Your cup &middot; ${total * 30} ml</div>
    <div class="recipe-table">${cupRows}</div>
    <div class="closest-row" style="margin-top:8px; flex-wrap: wrap;">${pills}</div>
  `;
}

function render() {
  renderDrinks();
  renderStages();
  renderLiquid();
  renderBanner();
  renderNotes();
}

document.getElementById("clearBtn").onclick = () => { state.cup = {}; render(); };

renderFamilies();
render();

/* PWA: register service worker if hosted */
if ("serviceWorker" in navigator && location.protocol === "https:") {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
